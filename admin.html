<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/admin.css">
    <title>Menu Template | Admin</title>
</head>

<body class="auth-success">
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <span id="closeEditModal" class="modal-close">&times;</span>
            <h2>Редактировать блюдо</h2>
            <form id="editDishForm" class="dish-form">
                <input type="hidden" id="editDishId">
                <input type="text" id="editNameRu" placeholder="Название (RU)" required>
                <input type="text" id="editNameEn" placeholder="Name (EN)">
                <input type="text" id="editNameKz" placeholder="Атауы (KZ)">
                <textarea id="editDescRu" placeholder="Описание (RU)"></textarea>
                <textarea id="editDescEn" placeholder="Description (EN)"></textarea>
                <textarea id="editDescKz" placeholder="Сипаттамасы (KZ)"></textarea>
                <input type="number" id="editPrice" placeholder="Цена (₸)" required>
                <label>Категория:</label>
                <select id="editCategory" required></select>
                <button type="submit" class="btn-save-changes">Сохранить изменения</button>
            </form>
        </div>
    </div>

    <nav class="admin-nav">
        <h1>Admin Panel</h1>
        <button id="logoutBtn" class="btn-logout">Выйти</button>
    </nav>

    <div class="admin-category-box">
        <h4>Добавить новую категорию</h4>
        <div class="dish-form"> <input type="text" id="newCatRu" placeholder="Название (RU)">
            <input type="text" id="newCatEn" placeholder="Name (EN)">
            <input type="text" id="newCatKz" placeholder="Атауы (KZ)">
            <button type="button" id="saveCatBtn" class="btn-publish">Создать категорию</button>
        </div>
    </div>

    <div class="admin-category-list-box">
        <h4>Текущие категории</h4>
        <div id="adminCategoryList"></div>
    </div>

    <main class="admin-container">
        <section class="add-dish-section">
            <h2>Добавить новое блюдо</h2>
            <form id="addDishForm" class="dish-form"> <input type="text" id="dishNameRu" placeholder="Название (RU)"
                    required>
                <input type="text" id="dishNameEn" placeholder="Name (EN)" required>
                <input type="text" id="dishNameKz" placeholder="Атауы (KZ)" required>
                <textarea id="dishDescRu" placeholder="Описание (RU)"></textarea>
                <textarea id="dishDescEn" placeholder="Description (EN)"></textarea>
                <textarea id="dishDescKz" placeholder="Сипаттамасы (KZ)"></textarea>
                <input type="number" id="dishPrice" placeholder="Цена (₸)" required>

                <div class="file-input-wrapper">
                    <label for="dishImgFile">Фото блюда:</label>
                    <input type="file" id="dishImgFile" accept="image/*" required>
                </div>

                <select id="dishCategory" required>
                    <option value="" disabled selected>Загрузка категорий...</option>
                </select>
                <button type="submit" id="saveBtn" class="btn-publish">Опубликовать в меню</button>
            </form>
        </section>

        <section class="manage-dishes">
            <h2>Текущее меню</h2>
            <div class="filter-container">
                <button class="filter-btn active" data-category="all">Все</button>
                <div id="dynamicFilters" class="dynamic-filters-box"></div>
            </div>
            <div id="adminDishList"></div>
        </section>
    </main>

    <script type="module" src="js/admin.js"></script>
</body>

</html>
