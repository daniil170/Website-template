<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/admin.css">
    <title>Menu Template</title>
</head>

<body style="display: none;">
    <nav class="admin-nav">
        <h1>Admin Panel</h1>
        <button id="logoutBtn">Выйти</button>
    </nav>

    <div class="admin-category-box">
        <h4>Добавить новую категорию</h4>
        <div class="lang-group" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;">
            <input type="text" id="newCatRu" placeholder="Название (RU) - например: Салаты" required>
            <input type="text" id="newCatEn" placeholder="Name (EN) - например: Salads" required>
            <input type="text" id="newCatKz" placeholder="Атауы (KZ) - например: Салаттар" required>
        </div>
        <button type="button" id="saveCatBtn">Создать категорию</button>
    </div>

    <div class="admin-category-list-box">
        <h4>Текущие категории</h4>
        <div id="adminCategoryList">
            Загрузка...
        </div>
    </div>

    <main class="admin-container">
        <section class="add-dish-section">
            <h2>Добавить новое блюдо</h2>
            <form id="addDishForm">
                <input type="text" id="dishNameRu" placeholder="Название (RU)" required>
                <input type="text" id="dishNameEn" placeholder="Name (EN)" required>
                <input type="text" id="dishNameKz" placeholder="Атауы (KZ)" required>

                <div class="form-group">
                    <textarea id="dishDescRu" placeholder="Описание (RU)"></textarea>
                    <textarea id="dishDescEn" placeholder="Description (EN)"></textarea>
                    <textarea id="dishDescKz" placeholder="Сипаттамасы (KZ)"></textarea>
                </div>

                <input type="number" id="dishPrice" placeholder="Цена (₸)" required>
                <div class="form-group">
                    <label for="dishImgFile">Фото блюда (выберите из галереи):</label>
                    <input type="file" id="dishImgFile" accept="image/*" required>

                    <div id="previewContainer" style="margin-top: 10px; display: none;">
                        <p style="font-size: 0.8rem; color: #666;">Предпросмотр:</p>
                        <img id="imgPreview" src="" alt="Превью"
                            style="max-width: 150px; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                </div>

                <select id="dishCategory" required>
                    <option value="" disabled selected>Загрузка категорий...</option>
                </select>

                <button type="submit" id="saveBtn">Опубликовать в меню</button>
            </form>
        </section>

        <hr>

        <section class="manage-dishes">
            <h2>Текущее меню</h2>
            <div id="adminDishList">
            </div>
        </section>
    </main>

    <script type="module" src="js/admin.js"></script>
</body>

</html>
