<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&family=Playfair+Display:wght@400;600;700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/reset.css">
    <title>Lumiere - Modern Italian Kitchen</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="header-logo">
                    <img src="assets/images/logo.png" alt="Logo" class="logo">
                </div>
                <div class="header-title-info">
                    <h1 class="header-title">Lumiere</h1>
                </div>
                <div class="header-subtitle-info">
                    <p class="subtitle" data-i18n="subtitle">Современная итальянская кухня</p>
                </div>
                <div class="header-actions">
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ru">RU</button>
                    <button class="lang-btn" data-lang="kz">KZ</button>
                </div>
            </div>
        </div>
    </header>

    <nav class="menu-nav" id="dynamic-nav"></nav>

    <main class="menu" id="menu-container"></main>

    <footer class="footer">
        <div class="container">
            <h3 class="footer-title">Lumiere</h3>
            <p class="footer-address" data-i18n="footer.address">Almaty, Kazakhstan</p>
            <div class="footer-contact">
                <a href="tel:+77000000000" class="footer-link">+7 700 000 00 00</a>
                <a href="#" class="footer-link">Instagram</a>
            </div>
            <p class="footer-copy" data-i18n="footer.copy">© 2026 Lumiere Restaurant</p>
        </div>
    </footer>

    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-modal">
            <h2 id="welcome-title">Добро пожаловать</h2>
            <p id="welcome-subtitle">Выберите язык / Choose language</p>
            <div class="welcome-lang-btns">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="kz">KZ</button>
            </div>
        </div>
    </div>

    <div id="cart-nav" class="cart-nav hidden">
        <div class="cart-nav-content">
            <span id="cart-count">0</span>
            <span data-i18n="cart.view">Показать заказ</span>
            <span id="cart-total">0 ₸</span>
        </div>
    </div>

    <div id="cart-modal" class="cart-overlay">
        <div class="cart-modal-content">
            <button class="close-cart" onclick="toggleCart()">✕</button>
            <h2 data-i18n="cart.title" style="margin-bottom: 20px;">Ваш заказ</h2>

            <div id="cart-items-list">
            </div>

            <div class="cart-footer">
                <p class="cart-instruction"></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/index.js"></script>
</body>

</html>
