<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/reset.css">
    <title>Menu Template</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="header-logo">
                    <img src="assets/images/logo.png" alt="Logo" class="logo">
                </div>
                <div class="header-title-info">
                    <h3 class="header-title">Lumiere</h3>
                </div>
                <div class="header-subtitle-info">
                    <blockquote class="subtitle" data-i18n="subtitle">Modern Italian Kitchen</blockquote>
                </div>
                <div class="header-actions">
                    <button class="lang-btn active" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ru">RU</button>
                    <button class="lang-btn" data-lang="kz">KZ</button>
                </div>
            </div>
        </div>
    </header>

    <nav class="menu-nav">
        <a href="#pizza" data-i18n="nav.pizza">Pizza</a>
        <a href="#main-dishes" data-i18n="nav.mainDishes">Main Dishes</a>
        <a href="#salads" data-i18n="nav.salads">Salads</a>
        <a href="#desserts" data-i18n="nav.desserts">Desserts</a>
        <a href="#drinks" data-i18n="nav.drinks">Drinks</a>
    </nav>

    <main class="menu">

        <!-- MAIN DISHES -->
        <section id="main-dishes" class="menu-category">
            <h2 class="category-title" data-i18n="categories.mainDishes">Main Dishes</h2>
            <div class="dishes"></div>
        </section>

        <!-- PIZZA -->
        <section id="pizza" class="menu-category">
            <h2 class="category-title" data-i18n="categories.pizza">Pizza</h2>
            <div class="dishes"></div>
        </section>

        <!-- SALADS -->
        <section id="salads" class="menu-category">
            <h2 class="category-title" data-i18n="categories.salads">Salads</h2>
            <div class="dishes"></div>
        </section>

        <!-- DESSERTS -->
        <section id="desserts" class="menu-category">
            <h2 class="category-title" data-i18n="categories.desserts">Desserts</h2>
            <div class="dishes"></div>
        </section>

        <!-- DRINKS -->
        <section id="drinks" class="menu-category">
            <h2 class="category-title" data-i18n="categories.drinks">Drinks</h2>
            <div class="dishes"></div>
        </section>

    </main>

    <footer class="footer">
        <div class="container">
            <h3 class="footer-title">Lumiere</h3>
            <p class="footer-address" data-i18n="footer.address">Almaty, Kazakhstan</p>
            <div class="footer-contact">
                <a href="tel:+77000000000" class="footer-link">+7 700 000 00 00</a>
                <a href="#" class="footer-link">Instagram</a>
            </div>
            <p class="footer-copy" data-i18n="footer.copy">© 2026 Lumiere Restaurant</p>
        </div>
    </footer>

    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-modal">
            <h2 id="welcome-title">Добро пожаловать</h2>
            <p id="welcome-subtitle">Выберите язык</p>
            <div class="welcome-lang-btns">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="kz">KZ</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/index.js"></script>

</body>

</html>
